<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ - Smart E-Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<nav class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-4xl mx-auto px-4 flex items-center justify-between h-16">
        <a href="index.html" class="text-2xl font-bold text-blue-600">🎓 E-Learning</a>
        <div class="flex gap-3">
            <a href="my-courses.html" class="text-gray-600 hover:text-blue-600">Khóa học của tôi</a>
            <button onclick="handleLogout()" class="px-4 py-2 text-red-500 border border-red-500 rounded-lg text-sm">Đăng xuất</button>
        </div>
    </div>
</nav>
<div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">👤 Hồ sơ cá nhân</h1>
    <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Avatar Card -->
        <div class="bg-white rounded-xl shadow p-6 text-center">
            <img id="avatar-preview" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff&size=120" class="w-32 h-32 rounded-full mx-auto mb-4 object-cover border-4 border-blue-100">
            <div id="profile-name" class="text-xl font-bold text-gray-800 mb-1"></div>
            <div id="profile-role" class="mb-4"></div>
            <label class="cursor-pointer bg-blue-50 text-blue-600 px-4 py-2 rounded-lg text-sm hover:bg-blue-100 block">
                📷 Đổi ảnh đại diện
                <input type="file" id="avatar-input" accept="image/*" class="hidden" onchange="previewAvatar(event)">
            </label>
        </div>
        <!-- Info Form -->
        <div class="md:col-span-2 bg-white rounded-xl shadow p-6">
            <h2 class="text-lg font-bold mb-4">Thông tin cá nhân</h2>
            <form id="profile-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên</label>
                        <input type="text" id="full_name" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
                        <input type="tel" id="phone" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" disabled class="w-full border rounded-lg px-3 py-2 bg-gray-50 text-gray-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Giới thiệu bản thân</label>
                    <textarea id="bio" rows="3" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Viết đôi điều về bản thân..."></textarea>
                </div>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-medium">💾 Lưu thay đổi</button>
            </form>
        </div>
        <!-- Change Password -->
        <div class="md:col-span-3 bg-white rounded-xl shadow p-6">
            <h2 class="text-lg font-bold mb-4">🔒 Đổi mật khẩu</h2>
            <form id="password-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu hiện tại</label>
                    <input type="password" id="old_password" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu mới</label>
                    <input type="password" id="new_password" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Xác nhận mật khẩu mới</label>
                    <input type="password" id="new_password2" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="md:col-span-3">
                    <button type="submit" class="bg-orange-500 text-white px-6 py-2 rounded-lg hover:bg-orange-600 font-medium">🔐 Đổi mật khẩu</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="js/config.js"></script>
<script>
if (!Auth.requireLogin()) {}
function showAlert(msg, type='success') {
    const el = document.getElementById('alert');
    el.className = `mb-4 p-3 rounded-lg text-sm ${type==='success'?'bg-green-50 text-green-600 border border-green-200':'bg-red-50 text-red-600 border border-red-200'}`;
    el.textContent = msg; el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 3000);
}
async function loadProfile() {
    const data = await API.get('/auth/profile/');
    document.getElementById('full_name').value = data.full_name || '';
    document.getElementById('phone').value = data.phone || '';
    document.getElementById('email').value = data.email || '';
    document.getElementById('bio').value = data.bio || '';
    document.getElementById('profile-name').textContent = data.full_name || data.email;
    document.getElementById('profile-role').innerHTML = UI.roleBadge(data.role);
    if (data.avatar_url) document.getElementById('avatar-preview').src = data.avatar_url;
}
function previewAvatar(e) {
    const file = e.target.files[0];
    if (file) document.getElementById('avatar-preview').src = URL.createObjectURL(file);
}
document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData();
    fd.append('full_name', document.getElementById('full_name').value);
    fd.append('phone', document.getElementById('phone').value);
    fd.append('bio', document.getElementById('bio').value);
    const avatar = document.getElementById('avatar-input').files[0];
    if (avatar) fd.append('avatar', avatar);
    try {
        const data = await API.postForm('/auth/profile/', fd);
        localStorage.setItem('user', JSON.stringify(data.user));
        showAlert('Cập nhật thông tin thành công!');
    } catch { showAlert('Có lỗi xảy ra.', 'error'); }
});
document.getElementById('password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (document.getElementById('new_password').value !== document.getElementById('new_password2').value) {
        showAlert('Mật khẩu mới không khớp!', 'error'); return;
    }
    try {
        await API.post('/auth/change-password/', {
            old_password: document.getElementById('old_password').value,
            new_password: document.getElementById('new_password').value,
            new_password2: document.getElementById('new_password2').value,
        });
        showAlert('Đổi mật khẩu thành công!');
        document.getElementById('password-form').reset();
    } catch (err) { showAlert(err.data?.error || 'Mật khẩu cũ không đúng.', 'error'); }
});
function handleLogout() { Auth.logout(); }
loadProfile();
</script>
    <script src="js/chatbot.js"></script>
</body>
</html>

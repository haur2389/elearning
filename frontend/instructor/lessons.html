<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bài học - Giảng viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<nav class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
        <a href="../index.html" class="text-2xl font-bold text-blue-600">🎓 E-Learning</a>
        <div class="flex gap-3">
            <a href="courses.html" class="text-gray-600 hover:text-blue-600">← Khóa học của tôi</a>
            <button onclick="Auth.logout()" class="px-4 py-2 text-red-500 border border-red-500 rounded-lg text-sm">Đăng xuất</button>
        </div>
    </div>
</nav>
<div class="max-w-5xl mx-auto px-4 py-8">
    <div id="course-header" class="mb-6"></div>
    <div class="flex gap-6">
        <!-- Chapters sidebar -->
        <div class="w-72 shrink-0">
            <div class="bg-white rounded-xl shadow p-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-800">📖 Chương học</h3>
                    <button onclick="openChapterModal()" class="text-blue-600 text-sm hover:underline">+ Thêm</button>
                </div>
                <div id="chapters-list" class="space-y-2">
                    <div class="text-center text-gray-400 text-sm py-4">Đang tải...</div>
                </div>
            </div>
        </div>
        <!-- Lessons content -->
        <div class="flex-1">
            <div id="lessons-panel" class="bg-white rounded-xl shadow p-6">
                <div class="text-center text-gray-400 py-12">
                    <div class="text-4xl mb-3">👈</div>
                    <div>Chọn một chương để xem bài học</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Chapter Modal -->
<div id="chapter-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-96 p-6">
        <h2 class="text-lg font-bold mb-4">📖 Thêm chương mới</h2>
        <input type="text" id="chapter-title" placeholder="Tên chương (VD: Chương 1: Giới thiệu)" class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <input type="number" id="chapter-order" placeholder="Thứ tự (1, 2, 3...)" class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" min="1">
        <div class="flex gap-3">
            <button onclick="saveChapter()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-medium">Lưu</button>
            <button onclick="document.getElementById('chapter-modal').classList.add('hidden')" class="flex-1 border text-gray-600 py-2 rounded-lg hover:bg-gray-50">Hủy</button>
        </div>
    </div>
</div>

<!-- Lesson Modal -->
<div id="lesson-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto">
        <h2 id="lesson-modal-title" class="text-lg font-bold mb-4">📝 Thêm bài học</h2>
        <input type="hidden" id="lesson-id">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tên bài học *</label>
                <input type="text" id="lesson-title" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: Bài 1: Cài đặt môi trường">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Loại nội dung</label>
                    <select id="lesson-type" onchange="toggleContentFields()" class="w-full border rounded-lg px-3 py-2 focus:outline-none">
                        <option value="video">🎬 Video</option>
                        <option value="pdf">📄 PDF</option>
                        <option value="text">📝 Văn bản</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Thời lượng (phút)</label>
                    <input type="number" id="lesson-duration" class="w-full border rounded-lg px-3 py-2 focus:outline-none" placeholder="15" min="1">
                </div>
            </div>
            <div id="video-field">
                <label class="block text-sm font-medium text-gray-700 mb-1">URL Video YouTube</label>
                <input type="url" id="lesson-video" class="w-full border rounded-lg px-3 py-2 focus:outline-none" placeholder="https://www.youtube.com/watch?v=...">
                <p class="text-xs text-gray-400 mt-1">Dán link YouTube vào đây</p>
            </div>
            <div id="text-field" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">Nội dung bài học</label>
                <textarea id="lesson-content" rows="5" class="w-full border rounded-lg px-3 py-2 focus:outline-none" placeholder="Nhập nội dung bài học..."></textarea>
            </div>
            <div>
                <label class="flex items-center gap-2 cursor-pointer text-sm">
                    <input type="checkbox" id="lesson-preview" class="rounded">
                    <span class="text-gray-700">Cho xem thử (không cần đăng ký)</span>
                </label>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Thứ tự</label>
                <input type="number" id="lesson-order" class="w-full border rounded-lg px-3 py-2 focus:outline-none" placeholder="1" min="1">
            </div>
        </div>
        <div class="flex gap-3 mt-6">
            <button onclick="saveLesson()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-medium">💾 Lưu bài học</button>
            <button onclick="document.getElementById('lesson-modal').classList.add('hidden')" class="flex-1 border text-gray-600 py-2 rounded-lg hover:bg-gray-50">Hủy</button>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/notif-bell.js"></script>
<script>
if (!Auth.requireLogin()) {}
const courseId = new URLSearchParams(location.search).get('course');
if (!courseId) location.href = 'courses.html';
let selectedChapterId = null;

async function loadCourse() {
    try {
        const c = await API.get(`/courses/${courseId}/`);
        document.getElementById('course-header').innerHTML = `
            <div class="bg-white rounded-xl shadow p-4 flex justify-between items-center">
                <div><h1 class="text-xl font-bold text-gray-800">${c.title}</h1>
                <div class="text-sm text-gray-500 mt-1">${UI.levelBadge(c.level)} <span class="ml-2">${c.status === 'published' ? '✅ Đã xuất bản' : '📝 Bản nháp'}</span></div></div>
                <a href="../course-detail.html?id=${courseId}" class="text-blue-600 text-sm hover:underline">👁 Xem khóa học</a>
            </div>`;
        loadChapters(c.chapters || []);
    } catch { alert('Không thể tải khóa học!'); location.href = 'courses.html'; }
}

function loadChapters(chapters) {
    const list = document.getElementById('chapters-list');
    if (!chapters.length) {
        list.innerHTML = '<div class="text-center text-gray-400 text-sm py-4">Chưa có chương nào<br>Nhấn "+ Thêm" để tạo</div>';
        return;
    }
    list.innerHTML = chapters.map(ch => `
        <button onclick="selectChapter(${ch.id},'${ch.title.replace(/'/g,"\\'")}',${JSON.stringify(ch.lessons||[])})" id="chapter-btn-${ch.id}"
            class="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-blue-50 border border-transparent hover:border-blue-200 transition-all">
            <div class="font-medium text-gray-800 truncate">${ch.title}</div>
            <div class="text-gray-400 text-xs">${(ch.lessons||[]).length} bài học</div>
        </button>`).join('');
}

function selectChapter(id, title, lessons) {
    selectedChapterId = id;
    document.querySelectorAll('[id^="chapter-btn-"]').forEach(el => el.className = el.className.replace('bg-blue-50 border-blue-200','') + ' border-transparent');
    const btn = document.getElementById(`chapter-btn-${id}`);
    if (btn) btn.className = 'w-full text-left px-3 py-2 rounded-lg text-sm bg-blue-50 border border-blue-200 transition-all';
    renderLessons(title, lessons);
}

function renderLessons(chTitle, lessons) {
    const panel = document.getElementById('lessons-panel');
    panel.innerHTML = `
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-gray-800">📖 ${chTitle}</h2>
            <button onclick="openLessonModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">+ Thêm bài học</button>
        </div>
        ${!lessons.length ? '<div class="text-center py-12 text-gray-400"><div class="text-4xl mb-3">📭</div><div>Chưa có bài học nào</div></div>' :
        `<div class="space-y-2">${lessons.map((l,i) => `
            <div class="flex items-center gap-3 p-3 border rounded-lg hover:bg-gray-50">
                <span class="text-gray-400 text-sm w-6 text-center">${i+1}</span>
                <span>${l.content_type==='video'?'🎬':l.content_type==='pdf'?'📄':'📝'}</span>
                <div class="flex-1">
                    <div class="font-medium text-sm">${l.title}</div>
                    <div class="text-xs text-gray-400">${l.duration} phút ${l.is_preview?'• <span class="text-green-600">Xem thử</span>':''}</div>
                </div>
                <button onclick="openEditLesson(${JSON.stringify(l).replace(/"/g,'&quot;')})" class="text-blue-500 text-xs hover:underline">✏️ Sửa</button>
                <button onclick="deleteLesson(${l.id})" class="text-red-400 text-xs hover:underline">🗑</button>
            </div>`).join('')}</div>`}`;
}

function openChapterModal() { document.getElementById('chapter-title').value=''; document.getElementById('chapter-order').value=''; document.getElementById('chapter-modal').classList.remove('hidden'); }

async function saveChapter() {
    const title = document.getElementById('chapter-title').value.trim();
    const order = document.getElementById('chapter-order').value || 1;
    if (!title) { alert('Nhập tên chương!'); return; }
    try {
        await API.post(`/courses/${courseId}/chapters/`, { title, order: parseInt(order) });
        UI.showAlert('Thêm chương thành công!', 'success');
        document.getElementById('chapter-modal').classList.add('hidden');
        loadCourse();
    } catch { UI.showAlert('Lỗi thêm chương!', 'error'); }
}

function toggleContentFields() {
    const type = document.getElementById('lesson-type').value;
    document.getElementById('video-field').classList.toggle('hidden', type !== 'video');
    document.getElementById('text-field').classList.toggle('hidden', type !== 'text');
}

function openLessonModal() {
    if (!selectedChapterId) { alert('Vui lòng chọn chương trước!'); return; }
    document.getElementById('lesson-modal-title').textContent = '📝 Thêm bài học';
    document.getElementById('lesson-id').value = '';
    document.getElementById('lesson-title').value = '';
    document.getElementById('lesson-video').value = '';
    document.getElementById('lesson-content').value = '';
    document.getElementById('lesson-duration').value = 15;
    document.getElementById('lesson-order').value = 1;
    document.getElementById('lesson-preview').checked = false;
    document.getElementById('lesson-type').value = 'video';
    toggleContentFields();
    document.getElementById('lesson-modal').classList.remove('hidden');
}

function openEditLesson(l) {
    document.getElementById('lesson-modal-title').textContent = '✏️ Sửa bài học';
    document.getElementById('lesson-id').value = l.id;
    document.getElementById('lesson-title').value = l.title;
    document.getElementById('lesson-type').value = l.content_type;
    document.getElementById('lesson-video').value = l.video_url || '';
    document.getElementById('lesson-content').value = l.content || '';
    document.getElementById('lesson-duration').value = l.duration;
    document.getElementById('lesson-order').value = l.order;
    document.getElementById('lesson-preview').checked = l.is_preview;
    toggleContentFields();
    document.getElementById('lesson-modal').classList.remove('hidden');
}

async function saveLesson() {
    const id = document.getElementById('lesson-id').value;
    const title = document.getElementById('lesson-title').value.trim();
    if (!title) { alert('Nhập tên bài học!'); return; }
    const payload = {
        chapter: selectedChapterId,
        title,
        content_type: document.getElementById('lesson-type').value,
        video_url: document.getElementById('lesson-video').value,
        content: document.getElementById('lesson-content').value,
        duration: parseInt(document.getElementById('lesson-duration').value) || 15,
        order: parseInt(document.getElementById('lesson-order').value) || 1,
        is_preview: document.getElementById('lesson-preview').checked,
    };
    try {
        if (id) await API.patch(`/lessons/${id}/update/`, payload);
        else await API.post('/lessons/create/', payload);
        UI.showAlert(id ? 'Cập nhật bài học thành công!' : 'Thêm bài học thành công!', 'success');
        document.getElementById('lesson-modal').classList.add('hidden');
        // FIX: lưu lại chapterId để re-select sau khi reload
        const savedChapterId = selectedChapterId;
        await loadCourse();
        // Re-select chapter cũ
        if (savedChapterId) {
            setTimeout(() => {
                const btn = document.getElementById(`chapter-btn-${savedChapterId}`);
                if (btn) btn.click();
            }, 100);
        }
    } catch { UI.showAlert('Lỗi lưu bài học!', 'error'); }
}

async function deleteLesson(id) {
    if (!confirm('Xóa bài học này?')) return;
    try {
        await API.delete(`/lessons/${id}/update/`);
        UI.showAlert('Đã xóa bài học!', 'success');
        loadCourse();
    } catch { UI.showAlert('Lỗi xóa!', 'error'); }
}

loadCourse();
</script>
    <script src="../js/chatbot.js"></script>
</body>
</html>

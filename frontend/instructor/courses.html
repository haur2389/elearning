<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khóa học - Giảng viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<nav class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
        <a href="../index.html" class="text-2xl font-bold text-blue-600">🎓 E-Learning</a>
        <div class="flex items-center gap-4">
            <span id="instructor-name" class="text-gray-700 font-medium"></span>
            <a href="exams.html" class="text-gray-600 hover:text-blue-600">📝 Đề thi</a>
            <a href="assignments.html" class="text-gray-600 hover:text-blue-600">📋 Bài tập</a>
            <a href="../profile.html" class="text-gray-500 hover:text-blue-600 text-sm">Hồ sơ</a>
            <button onclick="Auth.logout()" class="px-4 py-2 text-red-500 border border-red-500 rounded-lg text-sm">Đăng xuất</button>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">📚 Khóa học của tôi</h1>
        <button onclick="openCreateModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-medium">+ Tạo khóa học mới</button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-xl shadow p-4 text-center"><div id="stat-courses" class="text-2xl font-bold text-blue-600">--</div><div class="text-gray-500 text-sm">Khóa học</div></div>
        <div class="bg-white rounded-xl shadow p-4 text-center"><div id="stat-students" class="text-2xl font-bold text-green-600">--</div><div class="text-gray-500 text-sm">Tổng học viên</div></div>
        <div class="bg-white rounded-xl shadow p-4 text-center"><div id="stat-published" class="text-2xl font-bold text-purple-600">--</div><div class="text-gray-500 text-sm">Đã xuất bản</div></div>
    </div>

    <!-- Courses grid -->
    <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
        <div class="col-span-full text-center py-20 text-gray-400"><div class="text-5xl mb-4">⏳</div>Đang tải...</div>
    </div>
</div>

<!-- Create/Edit Modal -->
<div id="course-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 id="modal-title" class="text-xl font-bold">📝 Tạo khóa học mới</h2>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">✕</button>
        </div>
        <div class="p-6 space-y-4">
            <input type="hidden" id="course-id">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tên khóa học <span class="text-red-500">*</span></label>
                <input type="text" id="course-title" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: Python cho người mới bắt đầu">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mô tả <span class="text-red-500">*</span></label>
                <textarea id="course-desc" rows="3" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Mô tả nội dung khóa học..."></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Danh mục</label>
                    <select id="course-category" class="w-full border rounded-lg px-3 py-2 focus:outline-none">
                        <option value="">-- Chọn danh mục --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Trình độ</label>
                    <select id="course-level" class="w-full border rounded-lg px-3 py-2 focus:outline-none">
                        <option value="beginner">Cơ bản</option>
                        <option value="intermediate">Trung cấp</option>
                        <option value="advanced">Nâng cao</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Học phí (VNĐ)</label>
                    <input type="number" id="course-price" class="w-full border rounded-lg px-3 py-2 focus:outline-none" placeholder="0 = Miễn phí" min="0">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Thời lượng (giờ)</label>
                    <input type="number" id="course-hours" class="w-full border rounded-lg px-3 py-2 focus:outline-none" placeholder="VD: 20" min="1">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mục tiêu khóa học</label>
                <textarea id="course-objectives" rows="2" class="w-full border rounded-lg px-3 py-2 focus:outline-none" placeholder="Sau khóa học, học viên có thể..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Yêu cầu đầu vào</label>
                <textarea id="course-requirements" rows="2" class="w-full border rounded-lg px-3 py-2 focus:outline-none" placeholder="Không yêu cầu kinh nghiệm..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Trạng thái</label>
                <select id="course-status" class="w-full border rounded-lg px-3 py-2 focus:outline-none">
                    <option value="published">Xuất bản ngay</option>
                    <option value="draft">Bản nháp</option>
                </select>
            </div>
        </div>
        <div class="p-6 border-t flex gap-3">
            <button onclick="saveCourse()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">💾 Lưu khóa học</button>
            <button onclick="closeModal()" class="flex-1 border text-gray-600 py-3 rounded-lg hover:bg-gray-50">Hủy</button>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>
<script>
if (!Auth.requireLogin()) {}
const user = Auth.getUser();
if (!['instructor','admin'].includes(user?.role)) { alert('Không có quyền!'); location.href='../index.html'; }
document.getElementById('instructor-name').textContent = user?.full_name || '';

async function loadCategories() {
    try {
        const rawCats = await API.get('/courses/categories/');
        const data = Array.isArray(rawCats) ? rawCats : (rawCats?.results || []);
        const sel = document.getElementById('course-category');
        data.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name}</option>`);
    } catch {}
}

async function loadCourses() {
    try {
        const data = await API.get('/courses/my-courses/');
        const courses = data?.results || data || [];
        document.getElementById('stat-courses').textContent = courses.length;
        document.getElementById('stat-students').textContent = courses.reduce((s,c) => s + (c.total_students||0), 0);
        document.getElementById('stat-published').textContent = courses.filter(c => c.status === 'published').length;
        const grid = document.getElementById('courses-grid');
        if (!courses.length) {
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400">
                <div class="text-5xl mb-4">📭</div>
                <div class="text-xl font-medium mb-4">Bạn chưa có khóa học nào</div>
                <button onclick="openCreateModal()" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 font-medium">+ Tạo khóa học đầu tiên</button>
            </div>`;
            return;
        }
        const statusMap = { published: ['Đã xuất bản','bg-green-100 text-green-700'], draft: ['Bản nháp','bg-yellow-100 text-yellow-700'], archived: ['Lưu trữ','bg-gray-100 text-gray-600'] };
        grid.innerHTML = courses.map(c => {
            const [sLabel, sCls] = statusMap[c.status] || ['?',''];
            return `<div class="bg-white rounded-xl shadow overflow-hidden">
                <img src="${c.thumbnail_url || UI.getCourseImage(c.title, c.category_name)}" class="w-full h-40 object-cover" alt="">
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <span class="px-2 py-1 rounded-full text-xs ${sCls}">${sLabel}</span>
                        ${UI.levelBadge(c.level)}
                    </div>
                    <h3 class="font-bold text-gray-800 mb-2 line-clamp-2">${c.title}</h3>
                    <div class="flex justify-between text-sm text-gray-500 mb-4">
                        <span>👥 ${c.total_students} học viên</span>
                        <span>⭐ ${(c.avg_rating||0).toFixed(1)}</span>
                        <span>${c.price==0 ? 'Miễn phí' : parseInt(c.price).toLocaleString('vi-VN')+'đ'}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openEditModal(${c.id})" class="flex-1 border border-blue-600 text-blue-600 py-2 rounded-lg text-sm hover:bg-blue-50">✏️ Sửa</button>
                        <a href="../course-detail.html?id=${c.id}" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm text-center hover:bg-blue-700">👁 Xem</a>
                    </div>
                </div>
            </div>`;
        }).join('');
    } catch { document.getElementById('courses-grid').innerHTML = '<div class="col-span-full text-center py-10 text-red-400">Lỗi tải dữ liệu</div>'; }
}

function openCreateModal() {
    document.getElementById('modal-title').textContent = '📝 Tạo khóa học mới';
    document.getElementById('course-id').value = '';
    ['title','desc','objectives','requirements'].forEach(f => document.getElementById('course-'+f).value = '');
    document.getElementById('course-price').value = 0;
    document.getElementById('course-hours').value = 10;
    document.getElementById('course-level').value = 'beginner';
    document.getElementById('course-status').value = 'published';
    document.getElementById('course-modal').classList.remove('hidden');
}

async function openEditModal(id) {
    try {
        const c = await API.get(`/courses/${id}/`);
        document.getElementById('modal-title').textContent = '✏️ Chỉnh sửa khóa học';
        document.getElementById('course-id').value = id;
        document.getElementById('course-title').value = c.title;
        document.getElementById('course-desc').value = c.description;
        document.getElementById('course-price').value = c.price;
        document.getElementById('course-hours').value = c.duration_hours;
        document.getElementById('course-level').value = c.level;
        document.getElementById('course-status').value = c.status;
        document.getElementById('course-objectives').value = c.objectives || '';
        document.getElementById('course-requirements').value = c.requirements || '';
        if (c.category) document.getElementById('course-category').value = c.category.id;
        document.getElementById('course-modal').classList.remove('hidden');
    } catch { UI.showAlert('Lỗi tải dữ liệu khóa học!', 'error'); }
}

function closeModal() { document.getElementById('course-modal').classList.add('hidden'); }

async function saveCourse() {
    const id = document.getElementById('course-id').value;
    const title = document.getElementById('course-title').value.trim();
    if (!title) { UI.showAlert('Vui lòng nhập tên khóa học!', 'error'); return; }
    const payload = {
        title,
        description: document.getElementById('course-desc').value,
        category: document.getElementById('course-category').value || null,
        level: document.getElementById('course-level').value,
        price: document.getElementById('course-price').value || 0,
        duration_hours: document.getElementById('course-hours').value || 0,
        status: document.getElementById('course-status').value,
        objectives: document.getElementById('course-objectives').value,
        requirements: document.getElementById('course-requirements').value,
    };
    try {
        if (id) {
            await API.patch(`/courses/${id}/update/`, payload);
            UI.showAlert('Cập nhật khóa học thành công!', 'success');
        } else {
            await API.post('/courses/create/', payload);
            UI.showAlert('Tạo khóa học thành công!', 'success');
        }
        closeModal();
        loadCourses();
    } catch (err) {
        const msg = err.data?.title?.[0] || err.data?.error || 'Lỗi lưu khóa học!';
        UI.showAlert(msg, 'error');
    }
}

loadCategories();
loadCourses();
</script>
    <script src="../js/chatbot.js"></script>
</body>
</html>

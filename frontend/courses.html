<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khóa học - Smart E-Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .course-card{transition:all .25s ease}
        .course-card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(0,0,0,.12)}
    </style>
</head>
<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
        <a href="index.html" class="text-2xl font-bold text-blue-600">🎓 E-Learning</a>
        <div id="nav-auth" class="flex gap-2"></div>
    </div>
</nav>

<!-- HEADER -->
<div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white py-12">
    <div class="max-w-7xl mx-auto px-4">
        <h1 class="text-4xl font-bold mb-2">📚 Tất cả Khóa học</h1>
        <p class="text-blue-100">Khám phá các môn học ngành Công nghệ thông tin - ĐH Bình Dương</p>
    </div>
</div>

<div class="max-w-7xl mx-auto px-4 py-8 flex gap-6">

    <!-- SIDEBAR -->
    <aside class="w-64 shrink-0">
        <div class="bg-white rounded-xl shadow p-5 sticky top-20">
            <h3 class="font-bold text-gray-800 mb-4">🔍 Lọc khóa học</h3>
            <div class="mb-4">
                <input type="text" id="search-input" placeholder="Tìm kiếm..."
                    class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    oninput="debounceSearch()">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Danh mục</label>
                <select id="filter-category" onchange="loadCourses()"
                    class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none">
                    <option value="">Tất cả</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Trình độ</label>
                <div class="space-y-2">
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="level" value="" onchange="loadCourses()" checked> Tất cả
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="level" value="beginner" onchange="loadCourses()"> Cơ bản
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="level" value="intermediate" onchange="loadCourses()"> Trung cấp
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="level" value="advanced" onchange="loadCourses()"> Nâng cao
                    </label>
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Giá</label>
                <div class="space-y-2">
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="price" value="" onchange="loadCourses()" checked> Tất cả
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="price" value="free" onchange="loadCourses()"> Miễn phí
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="radio" name="price" value="paid" onchange="loadCourses()"> Có phí
                    </label>
                </div>
            </div>
            <button onclick="resetFilters()" class="w-full text-sm text-red-500 hover:underline">✕ Xóa bộ lọc</button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="flex-1">
        <div class="flex justify-between items-center mb-4">
            <p id="result-count" class="text-gray-500 text-sm"></p>
            <select id="sort-select" onchange="loadCourses()"
                class="border rounded-lg px-3 py-2 text-sm focus:outline-none">
                <option value="-created_at">Mới nhất</option>
                <option value="price">Giá tăng dần</option>
                <option value="-price">Giá giảm dần</option>
                <option value="title">Tên A-Z</option>
            </select>
        </div>

        <div id="loading" class="text-center py-20 text-gray-400">
            <div class="text-5xl mb-4 animate-spin inline-block">⏳</div>
            <div>Đang tải khóa học...</div>
        </div>
        <div id="courses-grid" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
        <div id="no-results" class="hidden text-center py-20 text-gray-400">
            <div class="text-5xl mb-4">🔍</div>
            <div class="text-xl font-medium">Không tìm thấy khóa học</div>
            <p class="mt-2">Thử thay đổi bộ lọc hoặc từ khóa</p>
        </div>
        <div id="pagination" class="mt-8 flex justify-center gap-2 flex-wrap"></div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/wake-up.js"></script>
<script>
let searchTimeout;
const params = new URLSearchParams(location.search);

// Navbar
function initNav() {
    const user = Auth.getUser();
    const nav  = document.getElementById('nav-auth');
    if (user) {
        nav.innerHTML = `
            <a href="my-courses.html" class="text-gray-600 hover:text-blue-600 text-sm font-medium">📚 Khóa học của tôi</a>
            <button onclick="handleLogout()" class="px-3 py-1.5 text-red-500 border border-red-400 rounded-lg text-sm">Đăng xuất</button>`;
    } else {
        nav.innerHTML = `
            <a href="login.html" class="px-4 py-2 text-blue-600 border border-blue-600 rounded-lg hover:bg-blue-50 text-sm">Đăng nhập</a>
            <a href="register.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">Đăng ký</a>`;
    }
}

async function loadCategories() {
    try {
        const data = await API.get('/courses/categories/');
        const sel  = document.getElementById('filter-category');
        data.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name} (${c.course_count})</option>`);
        if (params.get('category')) sel.value = params.get('category');
    } catch {}
}

async function loadCourses(page = 1) {
    const search   = document.getElementById('search-input').value;
    const category = document.getElementById('filter-category').value;
    const level    = document.querySelector('input[name="level"]:checked')?.value;
    const price    = document.querySelector('input[name="price"]:checked')?.value;
    const sort     = document.getElementById('sort-select').value;

    let url = `/courses/?status=published&ordering=${sort}&page=${page}`;
    if (search)   url += `&search=${encodeURIComponent(search)}`;
    if (category) url += `&category=${category}`;
    if (level)    url += `&level=${level}`;

    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('courses-grid').classList.add('hidden');
    document.getElementById('no-results').classList.add('hidden');

    try {
        const data    = await API.get(url);
        let courses   = data?.results || data || [];

        // Lọc giá client-side
        if (price === 'free') courses = courses.filter(c => !c.price || c.price == 0 || c.price === '0.00');
        if (price === 'paid') courses = courses.filter(c => c.price && c.price != 0 && c.price !== '0.00');

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('result-count').textContent = `${data?.count || courses.length} khóa học`;

        if (!courses.length) {
            document.getElementById('no-results').classList.remove('hidden');
            return;
        }

        const grid = document.getElementById('courses-grid');
        grid.classList.remove('hidden');
        grid.innerHTML = courses.map(c => {
            const img = c.thumbnail_url || UI.getCategoryImage(c.category_name, c.title);
            return `
            <div class="course-card bg-white rounded-xl shadow overflow-hidden flex flex-col">
                <div class="relative overflow-hidden h-44 cursor-pointer" onclick="location.href='course-detail.html?id=${c.id}'">
                    <img src="${img}" alt="${c.title}"
                         class="w-full h-44 object-cover hover:scale-105 transition-transform duration-300"
                         onerror="this.src='https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400&h=200&fit=crop'">
                    <div class="absolute top-2 left-2">${UI.levelBadge(c.level)}</div>
                    ${(!c.price || c.price == 0) ? '<div class="absolute top-2 right-2 bg-green-500 text-white text-xs px-2 py-1 rounded-full font-bold">FREE</div>' : ''}
                </div>
                <div class="p-4 flex flex-col flex-1">
                    <p class="text-xs text-blue-500 font-medium mb-1">${c.category_name || 'CNTT'}</p>
                    <h3 class="font-bold text-gray-800 line-clamp-2 mb-2 h-12 cursor-pointer hover:text-blue-600"
                        onclick="location.href='course-detail.html?id=${c.id}'">${c.title}</h3>
                    <p class="text-gray-500 text-sm mb-1">👨‍🏫 ${c.instructor_name || 'Giảng viên'}</p>
                    <div class="flex items-center gap-1 text-yellow-500 text-sm mb-3">
                        ${UI.renderStars(c.avg_rating)}
                        <span class="text-gray-400 text-xs ml-1">· ${c.total_students || 0} học viên</span>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t mb-3">
                        <div class="text-lg">${UI.formatPrice(c.price)}</div>
                        <span class="text-gray-400 text-xs">⏱ ${c.duration_hours}h</span>
                    </div>
                    <div class="flex gap-2 mt-auto">
                        <a href="course-detail.html?id=${c.id}"
                           class="flex-1 text-center border border-blue-600 text-blue-600 rounded-lg py-2 text-sm font-medium hover:bg-blue-50 transition-all">
                           Xem chi tiết
                        </a>
                        <button onclick="quickEnroll(${c.id}, ${c.price || 0})"
                           class="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-blue-700 transition-all">
                           Đăng ký ngay
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');

        // Pagination
        if (data?.count > 10) {
            const total = Math.ceil(data.count / 10);
            document.getElementById('pagination').innerHTML =
                Array.from({length: total}, (_, i) => i + 1).map(i =>
                    `<button onclick="loadCourses(${i})"
                        class="px-4 py-2 rounded-lg text-sm font-medium ${i === page ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border hover:bg-gray-50'}">${i}</button>`
                ).join('');
        }
    } catch {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('no-results').classList.remove('hidden');
    }
}

async function quickEnroll(courseId, price) {
    if (!Auth.isLoggedIn()) {
        if (confirm("Bạn cần đăng nhập để đăng ký khóa học. Đăng nhập ngay?")) location.href = "login.html";
        return;
    }
    if (price > 0) { location.href = `payment.html?course=${courseId}`; return; }
    try {
        await API.post("/enrollments/enroll/", { course_id: parseInt(courseId) });
        UI.showAlert("Đăng ký thành công! 🎉 Vào \"Khóa học của tôi\" để bắt đầu học.", "success", 4000);
    } catch (err) {
        const msg = err.data?.error || "";
        if (msg.includes("already") || msg.includes("đã")) location.href = `course-detail.html?id=${courseId}`;
        else UI.showAlert(msg || "Đã có lỗi xảy ra.", "error");
    }
}

function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => loadCourses(), 500);
}

function resetFilters() {
    document.getElementById('search-input').value = '';
    document.getElementById('filter-category').value = '';
    document.querySelectorAll('input[name="level"]')[0].checked = true;
    document.querySelectorAll('input[name="price"]')[0].checked = true;
    loadCourses();
}

function handleLogout() {
    API.post('/auth/logout/', { refresh: localStorage.getItem('refresh_token') }).catch(() => {});
    Auth.logout();
}

initNav();
loadCategories();
loadCourses();
</script>
</body>
</html>

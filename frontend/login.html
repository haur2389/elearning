<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Smart E-Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
    <div class="text-center mb-8">
        <a href="index.html" class="text-3xl font-bold text-blue-600">🎓 E-Learning</a>
        <p class="text-gray-500 mt-2">Chào mừng bạn quay lại!</p>
    </div>

    <!-- Alert -->
    <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

    <form id="login-form" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" required placeholder="Nhập email của bạn"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
            <div class="relative">
                <input type="password" id="password" required placeholder="Nhập mật khẩu"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 pr-12">
                <button type="button" onclick="togglePassword()" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">👁️</button>
            </div>
        </div>
        <div class="flex justify-between items-center text-sm">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" class="rounded"> <span class="text-gray-600">Ghi nhớ đăng nhập</span>
            </label>
            <a href="forgot-password.html" class="text-blue-600 hover:underline">Quên mật khẩu?</a>
        </div>
        <button type="submit" id="submit-btn"
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-all">
            Đăng nhập
        </button>
    </form>

    <!-- Demo accounts -->
    <div class="mt-4 bg-gray-50 rounded-lg p-4 text-sm">
        <div class="font-medium text-gray-700 mb-2">🔑 Tài khoản demo:</div>
        <div class="space-y-1 text-gray-600">
            <div class="flex justify-between"><span>Admin:</span> <button onclick="fillDemo('admin@elearning.com','Admin@123')" class="text-blue-500 hover:underline">admin@elearning.com / Admin@123</button></div>
            <div class="flex justify-between"><span>Giảng viên:</span> <button onclick="fillDemo('gv1@elearning.com','Gv@123456')" class="text-blue-500 hover:underline">gv1@elearning.com / Gv@123456</button></div>
            <div class="flex justify-between"><span>Sinh viên:</span> <button onclick="fillDemo('sv1@elearning.com','Sv@123456')" class="text-blue-500 hover:underline">sv1@elearning.com / Sv@123456</button></div>
        </div>
    </div>

    <div class="text-center mt-6 text-gray-600 text-sm">
        Chưa có tài khoản? <a href="register.html" class="text-blue-600 font-medium hover:underline">Đăng ký ngay</a>
    </div>
</div>

<script src="js/config.js"></script>
<script>
if (Auth.isLoggedIn()) {
    const user = Auth.getUser();
    redirectByRole(user?.role);
}

function redirectByRole(role) {
    if (role === 'admin') location.href = 'admin/dashboard.html';
    else if (role === 'instructor') location.href = 'instructor/courses.html';
    else location.href = 'index.html';
}

function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert');
    el.className = `mb-4 p-3 rounded-lg text-sm ${type === 'error' ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-600 border border-green-200'}`;
    el.textContent = msg;
    el.classList.remove('hidden');
}

function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
}

function fillDemo(email, pass) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = pass;
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Đang đăng nhập...';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const data = await API.post('/auth/login/', { email, password });
        if (data) {
            Auth.login(
                { access: data.access, refresh: data.refresh },
                data.user
            );
            UI.showAlert('Đăng nhập thành công!', 'success');
            setTimeout(() => redirectByRole(data.user?.role), 800);
        }
    } catch (err) {
        const msg = err.data?.detail || err.data?.error || 'Email hoặc mật khẩu không đúng.';
        showAlert(msg);
        btn.disabled = false;
        btn.textContent = 'Đăng nhập';
    }
});
</script>
</body>
</html>

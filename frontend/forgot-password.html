<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - E-Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 flex items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
    <div class="text-center mb-8">
        <a href="index.html" class="text-3xl font-bold text-blue-600">🎓 E-Learning</a>
        <p class="text-gray-500 mt-2">Đặt lại mật khẩu</p>
    </div>
    <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

    <!-- Bước 1: Nhập email -->
    <div id="step1">
        <p class="text-gray-600 text-sm mb-4">Nhập email đã đăng ký, chúng tôi sẽ gửi mã OTP 6 chữ số về email của bạn.</p>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" placeholder="Nhập email của bạn"
                    class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="sendOTP()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
                📧 Gửi mã OTP
            </button>
        </div>
    </div>

    <!-- Bước 2: Nhập OTP + mật khẩu mới -->
    <div id="step2" class="hidden space-y-4">
        <div class="bg-green-50 rounded-lg p-3 text-sm text-green-700 mb-2">
            ✅ Mã OTP đã gửi về email <b id="sent-email"></b>. Kiểm tra hộp thư (và thư mục Spam).
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Mã OTP (6 chữ số)</label>
            <input type="text" id="otp" maxlength="6" placeholder="Nhập mã OTP"
                class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-center text-2xl font-bold tracking-widest">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu mới</label>
            <input type="password" id="new-password" placeholder="Tối thiểu 8 ký tự"
                class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Xác nhận mật khẩu mới</label>
            <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu mới"
                class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button onclick="resetPassword()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
            🔐 Đặt lại mật khẩu
        </button>
        <button onclick="sendOTP()" class="w-full text-blue-600 text-sm hover:underline">Gửi lại OTP</button>
    </div>

    <div class="text-center mt-6">
        <a href="login.html" class="text-gray-500 text-sm hover:underline">← Quay lại đăng nhập</a>
    </div>
</div>
<script src="js/config.js"></script>
<script>
function showAlert(msg, type='error') {
    const el = document.getElementById('alert');
    el.className = `mb-4 p-3 rounded-lg text-sm ${type==='success'?'bg-green-50 text-green-600 border border-green-200':'bg-red-50 text-red-600 border border-red-200'}`;
    el.textContent = msg; el.classList.remove('hidden');
}
async function sendOTP() {
    const email = document.getElementById('email').value.trim();
    if (!email) { showAlert('Vui lòng nhập email!'); return; }
    try {
        await API.post('/auth/forgot-password/', { email });
        document.getElementById('sent-email').textContent = email;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('alert').classList.add('hidden');
    } catch { showAlert('Gửi OTP thất bại. Kiểm tra lại email.'); }
}
async function resetPassword() {
    const otp = document.getElementById('otp').value.trim();
    const newPass = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const email = document.getElementById('email').value.trim();
    if (newPass !== confirm) { showAlert('Mật khẩu xác nhận không khớp!'); return; }
    if (newPass.length < 8) { showAlert('Mật khẩu phải có ít nhất 8 ký tự!'); return; }
    try {
        await API.post('/auth/reset-password/', { email, otp, new_password: newPass });
        showAlert('Đặt lại mật khẩu thành công! Đang chuyển về trang đăng nhập...', 'success');
        setTimeout(() => location.href = 'login.html', 2000);
    } catch (err) {
        showAlert(err.data?.error || 'OTP không đúng hoặc đã hết hạn!');
    }
}
</script>
</body>
</html>
